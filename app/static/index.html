<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Legal Workbench</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div>
          <h1>Legal Workbench</h1>
          <p>选择能力，上传交易文件，生成可复核、可导出的法律工作成果。</p>
        </div>
        <div class="header-actions">
          <span id="modelBadge" class="badge pending">模型检测中</span>
          <span id="stateBadge" class="badge">未开始</span>
        </div>
      </header>

      <section class="workspace">
        <aside class="sidebar">
          <div class="section-head compact">
            <h2>能力</h2>
            <span id="capabilityCount" class="muted">加载中</span>
          </div>
          <nav id="capabilityNav" class="capability-nav" aria-label="能力列表"></nav>
        </aside>

        <section class="main-panel">
          <div class="capability-head">
            <div>
              <p class="eyebrow">当前能力</p>
              <h2 id="capabilityTitle">加载中</h2>
              <p id="capabilityDescription" class="muted">正在读取工作台能力。</p>
            </div>
            <button type="button" id="checkWorkbench" class="secondary">测试工作台</button>
          </div>

          <section class="panel">
            <h3>交易文件</h3>
            <div class="upload-area document-upload-list">
              <div class="document-upload-row">
                <div>
                  <strong>增资协议（SPA）</strong>
                  <div id="spaFileList" class="file-list muted">尚未选择文件。</div>
                </div>
                <label class="file-picker">
                  <span>选择文件</span>
                  <input id="spaDocumentFile" type="file" accept=".docx,.docx.crdownload,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
                </label>
              </div>
              <div class="document-upload-row">
                <div>
                  <strong>股东协议（SHA）</strong>
                  <div id="shaFileList" class="file-list muted">尚未选择文件。</div>
                </div>
                <label class="file-picker">
                  <span>选择文件</span>
                  <input id="shaDocumentFile" type="file" accept=".docx,.docx.crdownload,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
                </label>
              </div>
              <button type="button" id="uploadDocuments" class="primary">生成 KTS</button>
            </div>
          </section>

          <section class="panel">
            <div class="section-head compact">
              <h3>处理结果</h3>
              <div class="section-actions">
                <button type="button" id="resumeKtsReview" class="secondary">继续上次复核</button>
              </div>
            </div>
            <div id="resultBox" class="result empty">尚未处理。</div>
          </section>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
