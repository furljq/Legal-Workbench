<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Legal Workbench</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div>
          <h1>Legal Workbench</h1>
          <p>选择能力，上传交易文件，生成可复核、可导出的法律工作成果。</p>
        </div>
        <div class="header-actions">
          <span id="modelBadge" class="badge pending">模型检测中</span>
          <span id="stateBadge" class="badge">未开始</span>
        </div>
      </header>

      <section class="workspace">
        <aside class="sidebar">
          <div class="section-head compact">
            <h2>能力</h2>
            <span id="capabilityCount" class="muted">加载中</span>
          </div>
          <nav id="capabilityNav" class="capability-nav" aria-label="能力列表"></nav>
        </aside>

        <section class="main-panel">
          <div class="capability-head">
            <div>
              <p class="eyebrow">当前能力</p>
              <h2 id="capabilityTitle">加载中</h2>
              <p id="capabilityDescription" class="muted">正在读取 capability registry。</p>
            </div>
            <button type="button" id="checkWorkbench" class="secondary">测试工作台</button>
          </div>

          <section class="panel">
            <h3>交易文件</h3>
            <div class="upload-area">
              <label class="file-picker">
                <span>选择 Word 文件</span>
                <input id="documentFiles" type="file" multiple accept=".docx,.docx.crdownload,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
              </label>
              <div id="fileList" class="file-list muted">尚未选择文件。</div>
              <button type="button" id="uploadDocuments" class="primary">生成候选证据</button>
            </div>
          </section>

          <section class="panel">
            <h3>事项背景</h3>
            <div class="form-grid">
              <label>
                我方角色
                <select id="partyRole">
                  <option value="investor">投资人</option>
                  <option value="company">公司</option>
                  <option value="founder">创始人</option>
                  <option value="unknown">暂不确定</option>
                </select>
              </label>
              <label class="wide">
                备注
                <textarea id="matterNotes" rows="4" placeholder="例如：本轮先复现 B 套单轮摘要，暂不生成谈判建议。"></textarea>
              </label>
            </div>
          </section>

          <details class="panel advanced-panel">
            <summary>高级信息：能力规则</summary>
            <p class="muted">供维护和调试使用；普通使用无需查看。</p>
            <pre id="capabilityJson" class="codebox">等待加载。</pre>
          </details>

          <section class="panel">
            <h3>处理结果</h3>
            <div id="resultBox" class="result empty">尚未处理。</div>
            <details class="advanced-block">
              <summary>高级信息：当前处理原始数据</summary>
              <pre id="rawResultJson" class="codebox">尚未处理。</pre>
            </details>
          </section>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
